name: Migration Drift

# Guards against the failure mode where a migration is committed to the repo
# but never applied to the database (the camp-planner DB had drifted 5
# migrations behind before this check existed).
#
#   - PRs touching migrations          -> structural lint only (no DB access).
#                                          New migrations legitimately aren't
#                                          applied yet, so we do NOT compare to
#                                          the DB here; we only validate
#                                          numbering/format. Keeps the DB secret
#                                          off untrusted PR runs.
#   - push to main / manual dispatch   -> structural lint + live DB comparison.
#                                          Fails (and opens an issue) if any repo
#                                          migration is not applied. After you
#                                          apply a pending migration, re-run this
#                                          workflow (workflow_dispatch) or push to
#                                          flip it green.
#
# Requires repo secret SUPABASE_DB_URL: a Postgres connection string (pooler is
# fine, include ?sslmode=require) for a role that can SELECT
# supabase_migrations.schema_migrations.
#
# Caveat: migrations applied by pasting SQL into the Supabase dashboard do NOT
# record in schema_migrations and would false-positive here. Always apply via
# apply_migration / the Supabase CLI.

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/check-migration-drift.mjs"
      - ".github/workflows/migration-drift.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structural:
    name: Structural lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node scripts/check-migration-drift.mjs --structural

  drift:
    name: DB drift
    # Trusted events only — never on pull_request (keeps SUPABASE_DB_URL off
    # fork PR runs, and a PR's own new migration would false-flag anyway).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Ensure psql is available
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: Read applied migrations from the database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set — cannot check migration drift."
            exit 1
          fi
          psql "$SUPABASE_DB_URL" -tAc \
            "select name from supabase_migrations.schema_migrations order by version" \
            > applied.txt
          echo "Read $(grep -c . applied.txt) applied migration rows from the database."
      - name: Check drift
        id: drift
        run: node scripts/check-migration-drift.mjs --drift applied.txt | tee drift-report.md
      - name: Open or update drift issue
        if: failure() && steps.drift.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create migration-drift --color B60205 \
            --description "Repo migrations not applied to the database" 2>/dev/null || true
          existing=$(gh issue list --label migration-drift --state open \
            --json number --jq '.[0].number' 2>/dev/null || true)
          {
            echo "Detected on commit ${GITHUB_SHA} via ${GITHUB_WORKFLOW} (run ${GITHUB_RUN_ID})."
            echo
            cat drift-report.md
          } > issue-body.md
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file issue-body.md
            echo "Updated existing issue #$existing"
          else
            gh issue create --title "Migration drift detected on main" \
              --label migration-drift --body-file issue-body.md
          fi
