expectation:
  id: "EXP-025"
  intention: "INT-007"
  description: "Reservation details are accessible offline via PWA caching so users can reference them at the campsite without cell service."
  validation_criteria: "After a user views a trip's reservations while online, they can switch to airplane mode (or lose connectivity), reopen the app, and still see all reservation fields — campground name, site number, confirmation number, dates, times, cost, contact info, and notes — without any missing data or error screens."
  edge_cases:
    - "User has never opened a specific trip's reservations while online, then goes offline; the app shows a clear message that the data has not been cached rather than displaying a blank or broken page."
    - "User attempts to edit a reservation while offline; mutation buttons are disabled with a tooltip explaining editing is paused. Form contents are not lost — the user can re-submit when connectivity returns. (Amended 2026-05-25 by SPEC-008b.1: original wording promised queued offline writes + conflict resolution, which was descoped as YAGNI for v1 — read-only offline is the shipped behavior.)"
    - "PWA cache storage is constrained; the app relies on the browser's default LRU eviction. We do not implement custom prioritization. (Amended 2026-05-25 by SPEC-008b.1: original wording promised explicit prioritization + user notification, which was descoped — browser-managed eviction is the shipped behavior.)"
    - "User clears browser cache or storage while offline; the app communicates that cached data has been lost and prompts re-sync when back online."
  complexity: "high"
  owner: "Jason Robey"
  status: "shipped"
  shipped_on: "2026-05-25"
  shipped_by: "SPEC-008b.1"
