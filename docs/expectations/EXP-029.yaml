expectation:
  id: "EXP-029"
  intention: "INT-009"
  description: "Planners can generate a shareable link that grants view-only access to a trip, allowing guests to see trip details without needing an account."
  validation_criteria: "A planner clicks a 'Share' action on a trip, and the system generates a unique URL. Opening that URL in an incognito browser (no login) displays the trip in a read-only view. The link contains an unguessable token (minimum 128 bits of entropy)."
  edge_cases:
    - "Planner generates a share link, then generates another for the same trip; the system either reuses the existing link or creates a new one — either way, both behaviors are intentional and previously issued links remain valid unless explicitly revoked."
    - "A guest accesses the share link after the trip's end date has passed; the link still works and shows the trip data (including completed status and any journal entries) rather than returning a 'trip expired' error."
    - "Share link is accessed by a bot or web crawler; the system does not expose sensitive data in meta tags or previews beyond the trip name, and rate-limits repeated access from the same IP."
    - "Planner attempts to generate a share link while offline; the system informs them that link generation requires connectivity rather than creating an invalid or non-functional link."
  complexity: "medium"
  owner: "Jason Robey"
  status: "draft"
