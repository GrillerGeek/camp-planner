intention:
  id: "INT-007"
  product: "PROD-001"
  statement: >
    Users can store and manage campsite reservation details — booking
    confirmations, dates, check-in/out times, site numbers, costs, and
    contact info — in one place tied to the trip.
  rationale: >
    Reservation details are currently buried in email confirmations or
    scattered notes. Having them centralized and tied to the trip means
    quick access on arrival and no scrambling to find confirmation numbers.
  priority: "medium"
  dependencies:
    - "INT-001"
  owner: "Jason Robey"
  status: "draft"
