spec:
  id: "SPEC-010"
  name: "Weather-Aware Trip Prep"
  product: "PROD-001"
  status: "draft"
  owner: "Jason Robey"
  created: "2026-05-30"
  status_note: "Tech Lead review (2026-05-30) returned GO-WITH-CHANGES; all 3 blockers + 6 warnings/suggestions folded into the spec on 2026-05-30 (see review.resolution). Ready for implementation planning."

  context:
    description: >
      Adds weather awareness to trip planning. A planner resolves a trip's
      free-text destination to geographic coordinates (one-time, with a
      confirmation step for ambiguous places), after which the trip dashboard
      shows a daily forecast for the trip dates. On demand, the planner can run
      an AI "weather readiness" check that reasons over the forecast alongside
      the actual packing list and meal plan and returns advisory nudges about
      gaps (e.g., a rain day with no rain layer packed, a high-wind day with an
      open-flame meal). Forecast display is cheap and automatic; AI nudges are
      on-demand only (the "hybrid" trigger model). The feature is additive and
      degrades gracefully when location is unresolved, the trip is beyond the
      forecast horizon, or the weather provider is unavailable.
    product: "PROD-001"
    intentions:
      - id: "INT-010"
        statement: >
          Users can see a weather forecast for their trip's location and dates,
          and request AI-powered prep suggestions that flag gaps between the
          expected conditions and what they've actually packed and planned to
          eat — so weather surprises don't derail the trip.
    dependencies:
      - spec: "SPEC-001"
        reason: "Trip data model (destination, dates), Google OAuth, RLS, and the planner/viewer role check (getUserRoleForTrip)"
      - spec: "SPEC-002"
        reason: "Packing list items — the AI readiness check reasons over what's packed"
      - spec: "SPEC-003"
        reason: "Meal plan — the AI readiness check reasons over planned meals; reuses the lib/ai meal-suggestions pattern (generateText + Output.object + Zod, {ok} server-action wrapper)"
    stack:
      runtime: "Next.js 16 (App Router), TypeScript (strict)"
      styling: "Tailwind CSS v4, camp-* theme tokens (no hand-rolled hex)"
      database: "Supabase PostgreSQL with Row Level Security"
      ai: "Vercel AI Gateway via the `ai` SDK with plain provider/model strings"
      external_data: "Open-Meteo (free, no API key) — geocoding endpoint and 16-day daily forecast endpoint"
      hosting: "Vercel"
      patterns:
        - "Server components with client islands"
        - "Data access via lib/queries/<domain>.ts; external HTTP via server-only lib/weather/* modules"
        - "AI features in server-only lib/ai/<feature>.ts invoked from co-located actions.ts Server Actions wrapped in an {ok} discriminated union"
        - "Forecast cached via the Next data cache with explicit fetch options (next:{revalidate,tags}; fetch is NOT cached by default in Next 16), not a DB table; Server Actions are uncached and receive forecast as input rather than re-fetching"
        - "Mobile-first responsive design (PWA target)"

  expectations:
    - id: "EXP-032"
      intention: "INT-010"
      description: >
        Planners can resolve a trip's free-text destination to a geographic
        location and see a daily weather forecast for the trip's dates on the
        trip dashboard.
      validation_criteria: >
        On a trip whose destination has not yet been resolved, a planner sees a
        'Set location' prompt. Triggering it geocodes the destination and
        presents candidate matches; selecting one stores coordinates plus a
        human-readable location label. The dashboard then shows a per-day
        forecast (high/low temperature, precipitation probability, wind) for
        each trip day that falls within the forecast horizon.
      edge_cases:
        - "Destination is ambiguous (e.g., several 'Cedar Lake' results); the planner is shown multiple candidates with enough context (region/country) to pick the right one, rather than the system silently guessing one."
        - "Destination cannot be geocoded (typo, fictional, or too vague); the system shows a clear 'couldn't find that place' message and the trip remains fully usable without weather rather than erroring the dashboard."
        - "Trip start date is more than ~16 days out (beyond the provider's forecast horizon); the card shows the resolved location label and a 'forecast available closer to your trip' state instead of an empty or broken forecast."
        - "The weather provider is unreachable when the dashboard loads; the weather card degrades to a 'weather unavailable' state and the rest of the trip dashboard renders normally."

    - id: "EXP-033"
      intention: "INT-010"
      description: >
        Planners can request AI-powered prep nudges that compare the forecast
        against the trip's packing list and meal plan and surface specific gaps
        or risks.
      validation_criteria: >
        With a resolved location and an in-window forecast, a planner clicks
        'Check weather readiness'. The system returns advisory suggestions that
        reference both the actual conditions and the actual plan — e.g.,
        flagging a forecast rain day against a packing list with no rain layer,
        or a high-wind day against an open-flame meal. Suggestions are advisory
        text only and do not modify the packing list or meal plan.
      edge_cases:
        - "The packing list and meal plan already cover the forecast conditions well; the system returns a reassuring 'you're well prepared' result rather than inventing problems."
        - "The packing list or meal plan is empty; nudges still run against the forecast and suggest baseline essentials for the conditions rather than erroring."
        - "The AI gateway call fails or times out; the planner sees a clear inline error and can retry, with no partial or corrupted suggestions rendered."
        - "The forecast spans changing conditions across multiple days (warm start, cold and wet finish); nudges reflect the range rather than only the first or worst day."

    - id: "EXP-034"
      intention: "INT-010"
      description: >
        Weather display and prep nudges respect trip roles and trip state —
        viewers get read-only forecast access, and weather is suppressed where
        it has no value.
      validation_criteria: >
        A viewer-role member sees the forecast for a resolved trip but has no
        'Set location' or 'Check weather readiness' controls, and direct
        invocation of the location-write or nudge server actions as a viewer is
        rejected server-side. Completed or past trips do not render the weather
        card.
      edge_cases:
        - "A viewer calls the saveTripLocation or checkWeatherReadiness server action directly (bypassing the hidden UI); the action re-checks role server-side via getUserRoleForTrip and rejects with an access error rather than relying on the UI to hide controls."
        - "A trip transitions from upcoming to past while a planner has the dashboard open; on the next render the weather card disappears (or stops offering AI), consistent with the past-trip rule."
        - "Location was resolved by one planner; a second planner on the same trip sees the stored location and forecast without having to re-resolve it."
        - "A planner changes the trip's destination after a location was resolved; the system makes clear the stored coordinates may be stale and allows re-resolving, rather than silently keeping the old location forever with no recourse."

  boundaries:
    in_scope:
      - "Migration 025: add nullable latitude (double precision), longitude (double precision), and location_label (text) columns to the trips table, with MANDATORY CHECK constraints on lat/lng range and label length; additive and backward-compatible (existing trips read null = unresolved)"
      - "lib/weather/geocode.ts (server-only): Open-Meteo geocoding — destination text to capped (top-5) candidate matches with explicit admin/country fields; AbortSignal timeout"
      - "lib/weather/forecast.ts (server-only): Open-Meteo daily forecast by coordinates, scoped to trip dates, cached via the Next data cache with EXPLICIT next:{revalidate,tags} + a deterministic coords+dates key; horizon math relative to today; AbortSignal timeout"
      - "lib/weather/wmo-icons.ts (or a constant map): WMO weather-code -> icon/emoji mapping so the WeatherCard doesn't invent ad-hoc icon logic; camp-* token styling"
      - "lib/types/weather.ts: DailyForecast, GeocodeResult, WeatherNudge types"
      - "lib/queries/trips.ts: updateTripLocation(client, tripId, {lat, lng, label})"
      - "lib/ai/weather-nudges.ts (server-only): generateText + Output.object + Zod, reasons over forecast + packing items + meals"
      - "app/dashboard/trips/[tripId]/weather/actions.ts: geocodeDestination, saveTripLocation (planner-only), checkWeatherReadiness (planner-only) — each re-fetches the trip / role server-side and returns an {ok} discriminated union"
      - "app/dashboard/trips/[tripId]/components/WeatherCard.tsx: client island on the trip dashboard with states for unresolved / candidate-pick / in-window forecast + AI button / beyond-horizon / unavailable"
      - "Server-side forecast fetch added to the trip detail page Promise.all fan-out, guarded on coords present and trip not past"
    out_of_scope:
      - "Do not add a weather cache table or a nudges table — forecast uses the Next data cache; nudges are ephemeral (rendered, never persisted), mirroring meal suggestions"
      - "Do not auto-add suggested items to the packing list or modify the meal plan — v1 nudges are advisory text only"
      - "Do not make the weather card interactive for viewers — viewers see forecast read-only; set-location and AI actions are planner-only and enforced server-side"
      - "Do not run AI nudges automatically — they are on-demand via button only (hybrid trigger)"
      - "Do not implement a climate-normals / historical-averages fallback for far-future trips — show the beyond-horizon state instead"
      - "Do not implement hourly forecasts — daily granularity only"
      - "Do not implement weather-triggered push notifications (a candidate for a later spec building on the SPEC-008b PWA push groundwork)"
      - "Do not show weather for completed or past trips"
      - "Do not add a new weather API secret — Open-Meteo requires no API key"

  deliverables:
    database:
      - name: "025_trips_weather_location.sql"
        type: "supabase_migration"
        description: >
          Adds three nullable columns to public.trips: latitude (double
          precision), longitude (double precision), location_label (text,
          human-readable resolved place). Additive and backward-compatible; no
          RLS change needed (columns inherit the existing trips row policies).
          Existing rows read null, which the UI treats as "location not yet
          resolved." MANDATORY CHECK constraints (not optional) reject
          out-of-range values at the DB layer — the constraints are the
          authoritative bound that the validation block asserts:
            CHECK (latitude IS NULL OR latitude BETWEEN -90 AND 90)
            CHECK (longitude IS NULL OR longitude BETWEEN -180 AND 180)
          location_label is bounded with a length cap (e.g. <= 200 chars) via
          CHECK to prevent unbounded client-written strings.

    types:
      - name: "lib/types/weather.ts"
        description: >
          DailyForecast (date, temp_high, temp_low, precip_probability,
          wind_speed, wind_gust, weather_code). WeatherNudge (title, detail,
          severity: info | caution | warning, and which day(s) it relates to).
          GeocodeResult with EXPLICIT fields (not generic "region context"):
          name, admin1, admin2, country_code, country, latitude, longitude.
          The picker builds a disambiguation label from these in the format
          "<name>, <admin1>, <country_code>" (e.g. "Cedar Lake, Indiana, US").
          Trip type in lib/types/trip.ts extended with latitude, longitude,
          location_label (all nullable) to mirror the migration.

    ui:
      - name: "WeatherCard (planner-interactive client island)"
        description: >
          Rendered on the trip detail dashboard for non-past trips. States:
          (1) Unresolved — 'Set location for weather' CTA that runs
          geocodeDestination and shows candidate matches to pick from;
          (2) In-window — a per-day forecast strip (weather icon, high/low,
          precip %, wind) for the trip days, plus a 'Check weather readiness'
          button that runs the AI action and renders the returned nudges
          inline with severity styling using camp-* tokens;
          (3) Beyond-horizon — resolved location label + 'forecast available
          closer to your trip';
          (4) Unavailable — 'weather unavailable right now' degraded state.
          For viewer-role members, the forecast strip renders read-only with no
          set-location or readiness controls. A subtle affordance lets a planner
          re-resolve the location if the destination changed (this also busts
          the forecast cache for the trip — see forecast.ts cache tags).
          Past/completed guard: render WeatherCard only when NOT isPast AND
          trip.status !== 'completed', reusing the trip page's EXISTING
          todayYMD()/isPast computation (page.tsx) verbatim rather than
          introducing a parallel date check.

    api:
      - name: "lib/weather/geocode.ts (server-only)"
        description: >
          Calls the Open-Meteo geocoding endpoint with the trip's destination
          string; maps results to GeocodeResult[] with the explicit fields
          (name, admin1, admin2, country_code, country, lat, lng). Caps the
          candidate list (top 5) to bound the picker UI. Returns an empty array
          on no match. Wraps the fetch in AbortSignal.timeout (~4-5s) so a slow
          provider cannot stall the geocode action; timeout/error -> empty
          result the action surfaces as "couldn't find that place".
      - name: "lib/weather/forecast.ts (server-only)"
        description: >
          Calls the Open-Meteo forecast endpoint for given coordinates,
          requesting daily temp max/min, precipitation probability, wind speed,
          wind gusts, and weather code. Filters to the trip's date range, maps
          to DailyForecast[].
          CACHING (Next 16, explicit — fetch is NOT cached by default): pass
          `next: { revalidate: 21600, tags: ["trip-forecast:<tripId>"] }` on the
          Open-Meteo call. Build a DETERMINISTIC URL so the cache key is stable
          across renders: round lat/lng to ~2-3 decimals and use ISO dates —
          the key is per-coords-AND-per-date-window, not "by coordinates" alone.
          The cached path is the trip-page Server Component render. Server
          Actions run dynamically (uncached), so checkWeatherReadiness must NOT
          assume this fetch is cached in the action context — it instead RECEIVES
          the already-fetched DailyForecast[] from the page as input rather than
          re-fetching (see actions.ts). The re-resolve affordance calls
          revalidateTag("trip-forecast:<tripId>") to bust the cache on
          coordinate change.
          HORIZON MATH (relative to TODAY, since the provider window is relative
          to now — not to abstract trip dates): compute days-from-today for
          start and end. Render the in-window subset of days and show the
          beyond-horizon hint for any tail beyond ~16 days; a straddling trip
          (e.g. starts day 14, ends day 18) shows the first days' forecast and a
          "rest available closer" note. The ~6h revalidate means the day-boundary
          can drift slightly within a cached window — acceptable, noted.
          RELIABILITY: wrap the fetch in AbortSignal.timeout (~4-5s); timeout or
          provider error -> caller renders the "unavailable" degraded state so a
          hung request cannot stall the trip page Promise.all fan-out.
      - name: "lib/weather/wmo-icons.ts"
        description: >
          Pure WMO weather-code -> icon/emoji mapping (a constant map + a small
          lookup helper) consumed by the WeatherCard forecast strip, so the
          component does not invent ad-hoc icon logic. Icons styled with camp-*
          tokens per the no-hand-rolled-hex rule.
      - name: "lib/ai/weather-nudges.ts (server-only)"
        description: >
          generateText + Output.object over a Zod schema producing an array of
          WeatherNudge. Inputs: the DailyForecast[] for the trip, a compact
          view of the packing list (names + categories + whether essential),
          the meal plan (meal types + names + cook style if available), and
          trip context (destination, dates, trip_type). Prompted to return
          advisory, specific, plan-grounded suggestions (and an explicit
          'well prepared' result when no gaps), never to fabricate items not
          implied by the conditions.
          COST BOUNDS (mirror the meal-suggestions reference, which caps the
          recipe library at 50 and pins the model): cap packing input (slice to
          ~40 items, or summarize as category counts when larger) and meal input
          similarly; PIN the model string to the repo convention
          ("anthropic/claude-sonnet-4.6"); bound the WeatherNudge array in the
          Zod schema with .max(6). Together with the blocker-1 planner gate, this
          caps both who can spend tokens and how many per call.
      - name: "app/dashboard/trips/[tripId]/weather/actions.ts (Server Actions)"
        description: >
          All three re-fetch the trip server-side and wrap results in an
          {ok: true | false} discriminated union, logging failures server-side
          (meal-action pattern). PLANNER ENFORCEMENT NOTE: unlike the existing
          meals action (which relies on RLS alone), these MUST gate on role
          explicitly where RLS does not cover the operation — see
          checkWeatherReadiness below.

          geocodeDestination(tripId) -> {ok, candidates}: re-fetches the trip,
          calls lib/weather/geocode. Planner-gated (calls getUserRoleForTrip;
          reject non-planner) — geocoding is a write-precursor, not free.

          saveTripLocation(tripId, {lat, lng, label}) -> {ok}: re-checks role
          via getUserRoleForTrip (defense-in-depth — the trips UPDATE RLS policy,
          migration 001, is the real boundary and already blocks viewers).
          CONCRETE payload validation (client coords are a trust boundary, cf.
          migration-024 server-stamping): lat/lng must be FINITE numbers in
          range (-90..90 / -180..180), label a trimmed non-empty string within
          the length cap; reject anything else with {ok:false}. PREFER validating
          the chosen coords against one of the GeocodeResult candidates the
          server just returned over trusting arbitrary client-posted lat/lng.
          Calls updateTripLocation, then revalidates the trip path AND
          revalidateTag("trip-forecast:<tripId>") to drop any stale forecast.

          checkWeatherReadiness(tripId, forecast) -> {ok, nudges}: HARD planner
          gate FIRST — call getUserRoleForTrip and return {ok:false} when role
          !== 'planner' BEFORE any work. This gate is the authorization boundary
          for AI cost: RLS does NOT stop a viewer here (the action only reads
          viewer-readable forecast/packing/meals, then spends gateway tokens).
          Receives the page's already-fetched DailyForecast[] as input (Server
          Actions are uncached, so re-fetching here would bypass the data cache);
          fetches packing + meals server-side, calls generateWeatherNudges,
          returns nudges.

  validation:
    - expectation: "EXP-032"
      criteria: "On an existing trip with no stored coordinates, confirm the WeatherCard shows 'Set location'. Trigger it; confirm geocoding an ambiguous destination shows multiple candidates with region context; pick one and confirm coordinates + label persist and the per-day forecast renders aligned to the trip dates. Set a trip start date >16 days out and confirm the beyond-horizon state. Simulate provider failure and confirm the card degrades while the rest of the dashboard renders. Geocode an unresolvable destination and confirm the 'couldn't find that place' message."
    - expectation: "EXP-033"
      criteria: "With a resolved in-window trip, click 'Check weather readiness'. Confirm nudges reference the actual forecast and actual plan (e.g., a seeded rain day flags a packing list lacking a rain layer). Confirm an already-well-covered plan yields a reassuring result, an empty plan yields baseline essentials, multi-day changing conditions are reflected across days, and an AI failure renders a clear retryable inline error with nothing persisted."
    - expectation: "EXP-034"
      criteria: "As a viewer, confirm the forecast renders read-only with no set-location or readiness controls. Invoke saveTripLocation and checkWeatherReadiness directly as a viewer and confirm both are rejected server-side. Confirm a completed/past trip renders no weather card. Confirm a second planner sees the location resolved by the first without re-resolving. Change a trip's destination after resolution and confirm the re-resolve affordance is available."
    - criteria: "Confirm no new environment secret is required (Open-Meteo keyless). Confirm forecast responses are cached (repeat dashboard loads within the window do not re-hit the provider). Confirm latitude/longitude CHECK constraints reject out-of-range values. Confirm the migration is additive and existing trips load normally with null location."

  review:
    reviewer: "Tech Lead (AI-assisted, Opus 4.8)"
    date: "2026-05-30"
    status: "needs-changes"
    overall_feasibility: "buildable-on-this-stack"
    recommendation: "go-with-changes"
    summary: >
      Architecturally sound and a strong pattern-fit for this codebase. The
      lib/weather/* server-only family is the right home for external HTTP (it
      should NOT be forced through lib/queries, which is Supabase-only by
      convention). The lib/ai + actions {ok} + Promise.all fan-out reuse is
      faithful to the meal-suggestions reference. Three blockers must be fixed
      before execution, all concerning correctness/security guarantees the spec
      asserts but does not yet pin down: (1) viewer enforcement on the AI action
      cannot rely on RLS and must be an explicit role gate; (2) Next 16 fetch
      data-cache semantics are mis-specified for a per-coordinate, date-scoped
      forecast; (3) coordinate/payload validation on saveTripLocation needs to
      be concrete. Warnings cover geocoding ambiguity, horizon math, and AI cost
      exposure.
    findings:
      - severity: "blocker"
        block: "deliverables.api / expectations.EXP-034"
        description: >
          The spec says checkWeatherReadiness and saveTripLocation are
          'planner-only ... enforced server-side ... re-checks role via
          getUserRoleForTrip', but does not make explicit that RLS does NOT
          cover the AI action. Verified against the codebase: the only existing
          Server Action (app/dashboard/trips/[tripId]/meals/actions.ts) performs
          NO explicit role check — it relies entirely on RLS (getTripById
          returns null without access). For saveTripLocation that is adequate:
          migration 001 line 76 'Planners can update trips' makes the trips
          UPDATE planner-only at the DB layer, so a viewer's write silently
          no-ops. But checkWeatherReadiness only READS (forecast/packing/meals,
          all viewer-readable) and then spends AI tokens — RLS will NOT stop a
          viewer from triggering it. EXP-034's edge case requires this to be
          rejected. There is currently zero precedent in the repo for an
          explicit role gate in an action, so the implementer will likely copy
          the meal-action pattern and ship a viewer-exploitable AI endpoint.
        recommendation: >
          Make checkWeatherReadiness's planner gate a hard requirement in the
          deliverable text: call getUserRoleForTrip(supabase, tripId) and return
          {ok:false, error:'...'} when role !== 'planner' BEFORE any forecast
          fetch or generateWeatherNudges call. State explicitly that this gate
          is the authorization boundary for the AI cost (RLS does not cover it).
          For saveTripLocation, the explicit getUserRoleForTrip check is
          defense-in-depth (RLS already enforces it) — keep it but note that the
          DB policy is the real boundary.
      - severity: "blocker"
        block: "deliverables.api (lib/weather/forecast.ts) / stack.patterns / validation"
        description: >
          The caching design ('cached via the Next data cache (fetch revalidate
          ~6h) keyed by coordinates') is under-specified for Next 16 / this
          fetch shape and will likely not cache as intended. Two concrete
          issues: (a) The forecast URL embeds the trip's date range
          (start/end_date) as query params, so the cache key is per-coords-AND-
          per-date-window, not 'keyed by coordinates' as written — the
          validation criterion 'repeat dashboard loads within the window do not
          re-hit the provider' only holds if the URL is byte-identical across
          loads. (b) In Next 16 with the App Router, fetch is NOT cached by
          default; opting in requires `cache: 'force-cache'` (or an explicit
          `next: { revalidate }`), and — critically — fetch caching only applies
          inside a cacheable render scope. This forecast fetch runs both in the
          trip page Server Component (render scope) AND inside the
          checkWeatherReadiness Server Action (Server Actions are uncached / run
          dynamically), so the Action path will re-hit the provider every time
          regardless of the revalidate hint. The spec treats one fetch helper as
          uniformly cached across both call sites; it will not be.
        recommendation: >
          Pin the fetch options explicitly in the deliverable:
          `next: { revalidate: 21600 }` (and/or `cache:'force-cache'`) on the
          Open-Meteo call, and round/normalize the coordinates and the date
          window into the URL deterministically (e.g. lat/lng to ~2-3 decimals,
          ISO dates) so the cache key is stable across renders. State that the
          Server-Component dashboard render is the cached path; in
          checkWeatherReadiness, either reuse the same revalidate-tagged fetch
          (accepting it may re-fetch in the Action context) or pass the already-
          fetched DailyForecast[] from the page into the action input rather
          than re-fetching. Add a per-feature `next: { tags: [...] }` if you want
          the re-resolve affordance (EXP-034) to be able to bust the forecast
          cache on coordinate change.
      - severity: "blocker"
        block: "deliverables.database / deliverables.api (saveTripLocation)"
        description: >
          Coordinate validation is described twice but never made concrete, and
          the two layers can disagree. The migration says 'Optional CHECK
          constraints keep latitude in [-90,90] and longitude in [-180,180]' —
          'optional' is not actionable for an AI agent and the validation block
          asserts the constraints WILL reject out-of-range values, so they are
          not optional. Separately, saveTripLocation 'validates the payload' with
          no stated rules. Without a defined contract the agent may (a) skip the
          CHECK constraints entirely, or (b) accept NaN/Infinity/string-coerced
          lat/lng from the client payload (the action receives client-supplied
          coordinates, a trust boundary — mirror the migration-024 reasoning
          about not trusting client writes).
        recommendation: >
          Make the CHECK constraints mandatory in 025: `CHECK (latitude IS NULL
          OR latitude BETWEEN -90 AND 90)` and the longitude analogue. Specify
          saveTripLocation's payload validation concretely: lat/lng are finite
          numbers in range, label is a non-empty trimmed string with a max
          length; reject otherwise with {ok:false}. Consider validating against
          one of the geocode candidates the server returned rather than trusting
          arbitrary client coordinates (closes the 'client posts any lat/lng'
          gap).
      - severity: "warning"
        block: "expectations.EXP-032 / deliverables.api (geocode.ts)"
        description: >
          Geocoding ambiguity handling is well-described at the UX level
          (candidates with region context) but the GeocodeResult shape and the
          'enough context to disambiguate' contract are loose. Open-Meteo's
          geocoding returns name + admin1/admin2 + country + latitude/longitude
          + a feature population/elevation; two same-named lakes can share a
          country and even admin1. The spec's GeocodeResult lists
          'region/admin context' generically.
        recommendation: >
          Specify GeocodeResult fields explicitly (name, admin1, admin2,
          country_code, country, latitude, longitude) and state the label format
          used to disambiguate in the picker (e.g. 'Cedar Lake, Indiana, US').
          Cap the candidate count (e.g. top 5) to bound the picker UI.
      - severity: "warning"
        block: "expectations.EXP-032 (beyond-horizon edge) / deliverables.api (forecast.ts)"
        description: >
          The horizon math is described as '~16 days out' but the rule that
          decides beyond-horizon vs in-window is fuzzy. Open-Meteo's daily
          forecast supports up to 16 days forward from today and (optionally)
          past days; a trip can be partially in-window (starts day 14, ends day
          18). The spec's forecast.ts 'returns a typed empty/horizon result when
          the trip is outside the provider window' implies an all-or-nothing
          decision and does not say how a straddling trip renders.
        recommendation: >
          Define the rule precisely: compute days-from-today for start and end;
          render the in-window subset of days and show the beyond-horizon hint
          for the tail. State whether the horizon check is against today (the
          correct basis, since the provider window is relative to now) rather
          than against trip dates in the abstract. Note that the cache
          revalidate (~6h) means the 'days from today' boundary can drift within
          a cached window — acceptable, but call it out.
      - severity: "warning"
        block: "deliverables.api (weather-nudges.ts) / boundaries"
        description: >
          AI token/cost exposure is only partially bounded. The reference
          meal-suggestions caps the recipe library to 50 and uses sonnet-4.6.
          weather-nudges feeds 'the packing list (names + categories + whether
          essential)' and 'the meal plan' with no size cap — a large packing
          list (templates can apply dozens of items) plus a full meal plan can
          inflate the prompt. There is also no stated model choice or output
          cap (number of nudges).
        recommendation: >
          Cap the packing/meal inputs (e.g. slice to N items, summarize by
          category counts where possible), pin the model string (match the repo
          convention 'anthropic/claude-sonnet-4.6'), and bound the WeatherNudge
          array length in the Zod schema (e.g. .max(6)). Combined with the
          blocker-1 planner gate, this bounds cost.
      - severity: "suggestion"
        block: "expectations.EXP-034 (past-trip rule) / deliverables.ui"
        description: >
          'Do not show weather for completed or past trips' uses two different
          notions of 'past'. The page already computes isPast via
          `trip.end_date < todayYMD()` (page.tsx line 60) AND has a separate
          `trip.status === 'completed'`. The spec should reuse the existing
          isPast + status check verbatim so the weather-card suppression lines up
          exactly with the rest of the dashboard's past/completed logic.
        recommendation: >
          State the guard as: render WeatherCard only when NOT isPast AND status
          !== 'completed', reusing the page's existing todayYMD()/isPast
          computation rather than introducing a parallel date check.
      - severity: "suggestion"
        block: "deliverables.types"
        description: >
          The Trip type extension (latitude, longitude, location_label nullable)
          is noted under deliverables.types but the canonical Trip interface
          lives in lib/types/trip.ts (verified). Good. Minor: the spec adds
          weather_code to DailyForecast but doesn't specify the icon mapping
          (WMO weather codes -> emoji/icon) the WeatherCard needs.
        recommendation: >
          Add a small WMO-code-to-icon mapping helper to the deliverables (a
          pure function in lib/weather/ or a constant map) so the implementer
          doesn't invent ad-hoc icon logic in the component. Keep icons as
          camp-* token-styled, per the no-hand-rolled-hex rule.
      - severity: "suggestion"
        block: "boundaries / external API reliability"
        description: >
          First external-HTTP integration in the codebase. The spec correctly
          degrades on provider error, but says nothing about request timeout or
          retry. A hung Open-Meteo request would block the trip page's
          Promise.all fan-out and delay the whole dashboard.
        recommendation: >
          Add a fetch timeout (AbortSignal.timeout, e.g. 4-5s) to both weather
          fetches and treat timeout as the 'unavailable' degraded state, so a
          slow provider cannot stall the dashboard render. No retry needed for
          v1 (the card just shows unavailable).
