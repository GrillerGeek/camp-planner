spec:
  id: "SPEC-005b"
  name: "Meal planning follow-ups: AI suggestions, recipe snapshots, library UX"
  product: "PROD-001"
  parent: "SPEC-005"
  status: "shipped"
  shipped_on: "2026-05-25"
  owner: "Jason Robey"
  created: "2026-05-15"

  origin: >
    Items deferred from SPEC-005 retroactive deep review (2026-04-14).
    NOTE: AI meal suggestions are advertised in INT-003 but currently stubbed
    as a "Coming soon" toast. Closing this gap removes a fictional feature.

  context:
    intentions:
      - "INT-003"
    expectations:
      - "EXP-008 (recipe library)"
      - "EXP-009 (AI suggestions — currently stubbed)"
      - "EXP-010 (local-flavor suggestions — currently stubbed)"

  scope:
    - id: "SPEC-005b.1"
      summary: "AI meal suggestions (EXP-009)"
      status: "shipped"
      shipped_on: "2026-05-15"
      problem: >
        Suggest meal/recipe choices based on past favorites, trip history,
        and destination/season. UI shows a "Coming soon" toast today.
      approach_hint: >
        Use Vercel AI Gateway via "anthropic/claude-sonnet-4-6" (per CLAUDE
        knowledge cutoff). Server action gathers context (recent trips, top
        recipes, destination, season) and asks for N suggestions matching
        the trip context, returning structured JSON via tool use or
        generateObject. Cache per-trip suggestions for 24h.
      priority: "high"
      reason: "Closes a fictional feature gap and is core to INT-003."
      implementation: >
        lib/ai/meal-suggestions.ts (server-only): generateText + Output.object
        with a Zod schema for 5 structured suggestions. Uses the AI Gateway
        default provider with model string "anthropic/claude-sonnet-4.6".
        Context: destination, season (derived from start_date month),
        campsite_info, planner notes, recipe library (capped at 50), and
        existing meal-type distribution so the model biases toward gaps.
        app/dashboard/trips/[tripId]/meals/actions.ts: server action wraps
        the generation and looks up trip + recipes server-side.
        MealPlannerClient: replaces "Coming soon" toast with a real call,
        renders 5 suggestion cards with description + why_suggested + recipe
        match badge, "Add to next empty slot" button reuses existing addMeal.
        Per-trip caching deferred — first cut is a fresh call per click.
        Requires AI_GATEWAY_API_KEY in env for local dev; production uses
        OIDC automatically on Vercel.

    - id: "SPEC-005b.2"
      summary: "Local-flavor suggestions (EXP-010)"
      status: "shipped"
      shipped_on: "2026-05-15"
      problem: >
        Same as above, scoped to suggestions inspired by the destination
        region's local cuisine.
      approach_hint: >
        Same Gateway endpoint with a different system prompt + destination
        as the primary signal. May piggyback on SPEC-005b.1's endpoint.
      priority: "medium"
      implementation: >
        Folded into SPEC-005b.1. The single endpoint's prompt instructs the
        model to factor destination-region cuisine when the destination hints
        at it, rather than maintaining a separate code path. Validate by
        setting a destination like "New Orleans" and confirming gumbo /
        jambalaya / beignets show up in suggestions.

    - id: "SPEC-005b.3"
      summary: "Recipe snapshot on meal assignment"
      status: "shipped"
      shipped_on: "2026-05-17"
      problem: >
        Editing a recipe today mutates the version shown on past trips —
        history becomes a lie. Should snapshot the recipe at assignment time.
      approach_hint: >
        Add meal_plan_entries.recipe_snapshot jsonb. On assignment, copy
        ingredients + instructions into the snapshot. Recipe library page
        edits do not touch the snapshot. Pre-trip view reads live recipe,
        post-trip view reads snapshot.
      priority: "medium"
      implementation: >
        Migration 018 (supabase/migrations/018_meal_recipe_snapshot.sql) adds
        a nullable jsonb column recipe_snapshot to trip_meals. Null means no
        snapshot captured yet; pre-migration rows fall back to the live recipe,
        matching the old behavior. No backfill: the recipe's state at original
        assignment time is unknowable for existing rows.
        lib/queries/meals.ts: addMeal fetches the live recipe via a new
        fetchSnapshot helper and writes the snapshot at insert time.
        updateMeal refreshes the snapshot only when recipe_id is part of the
        update payload — clearing it to null when the meal is switched to a
        custom name, and leaving it untouched when recipe_id is absent from
        the update.
        lib/types/meals.ts: RecipeSnapshot interface (subset of Recipe display
        fields plus snapshot_at timestamp). TripMeal gains recipe_snapshot as
        an optional nullable field.
        MealEditModal: for trips with status "completed", the modal prefers
        meal.recipe_snapshot over the live recipe; snapshotAsRecipe() adapter
        casts RecipeSnapshot to the Recipe shape RecipeDetails accepts. The
        "Swap recipe" and "Attach a recipe" buttons are disabled on completed
        trips with a tooltip explaining why; "Use custom name" is hidden on
        completed trips.
        Hardening (2026-05-17): Migration 019
        (019_recipe_snapshot_immutable.sql) adds a BEFORE UPDATE trigger
        (SECURITY DEFINER, search_path locked) that raises an exception when
        recipe_snapshot changes on a completed trip, closing the direct-client
        bypass the UI guard cannot reach. fetchSnapshot in lib/queries/meals.ts
        now accepts a context object (trip_id, meal_id, recipe_id) and throws
        with those IDs included in the error message, making Vercel log
        triage actionable when a snapshot write fails. MealEditModal gains a
        saveError state rendered as a red banner above the modal footer so
        planners see the failure and can retry without losing their edits.

    - id: "SPEC-005b.4"
      summary: "Recipe library search + filter + pagination"
      status: "shipped"
      shipped_on: "2026-05-25"
      problem: >
        The recipe library has no search, no tag filter, and no pagination.
        Will become unusable past ~50 recipes.
      approach_hint: >
        Server-side query with ilike(name) + tag overlap + range(). Tag
        chip-filter UI on top of the existing grid.
      priority: "low"
      implementation: >
        New getRecipesPage(supabase, { search, tags, page, pageSize })
        in lib/queries/meals.ts. Uses .select("*", { count: "exact" })
        so the response carries the total count for pagination, .ilike
        on name (with %/_ escaping so verbatim wildcards don't sneak
        through), .overlaps on tags (text[] && text[] for "any of these
        tags"), and .range() for the page window. Default page size 24
        (3x3 desktop / 12x2 mobile), capped at 100.

        app/dashboard/recipes/page.tsx is now a Server Component that
        reads searchParams (q, tag, page), passes them to
        getRecipesPage, and renders the grid + pagination. URL-driven
        state means filters survive reloads and are shareable.

        New client components:
        - RecipesFilters: search input (debounced 250ms before URL
          write) + tag chip toggles. Tags clicked write to URL
          immediately for snappy feedback; search debounces to avoid a
          fetch per keystroke. Tag list validated server-side against
          RECIPE_TAGS so a hand-crafted URL can't pass an arbitrary
          string into the query.
        - RecipesPagination: Prev/Next with page indicator, preserves
          existing q + tag URL params.

        Empty states distinguished: "No recipes yet" (truly empty
        library) vs. "No recipes match these filters" (active filters,
        zero matches).

    - id: "SPEC-005b.5"
      summary: "Duplicate recipe name warning"
      status: "shipped"
      shipped_on: "2026-05-25"
      problem: >
        Two recipes can share the same name with no warning.
      approach_hint: >
        Optional partial unique index on (owner_id, lower(name)) or warning
        toast on save. The library is shared (RLS using true) so cross-user
        dup names are fine — only warn within a single owner.
      priority: "low"
      implementation: >
        Chose the soft warning over a hard unique index — gives the user
        the choice to keep both (e.g., "Chili" and "Chili" with different
        ingredients is sometimes intentional) and keeps the migration
        surface clean. If duplicate-rate ever justifies it, a partial
        unique index on (created_by, lower(name)) can be added without
        breaking existing rows.

        New getRecipeNameConflict(supabase, { name, excludeRecipeId })
        helper in lib/queries/meals.ts: case-insensitive equality via
        .ilike(escaped) — no wildcards in the escaped pattern, so ilike
        behaves as lower(name) = lower(input). Scoped to the current
        user's created_by. Returns { id, name } of the conflict or null.

        RecipeForm calls the helper on submit; if a conflict is found,
        window.confirm prompts "You already have a recipe named 'X'.
        Save this one anyway?" — Cancel returns to the form without
        clearing fields. Excludes the editing recipe id so saving an
        unchanged name on an edit doesn't false-positive.

  validation:
    human_review:
      - "AI: open a trip, request meal suggestions; receive 5 plausible suggestions matching season + destination within 10s"
      - "Snapshot: edit an old trip's assigned recipe ingredients; the trip's meal plan view does not change"
      - "Search: type 'chili' in recipe library; results filter live"
