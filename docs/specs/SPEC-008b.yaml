spec:
  id: "SPEC-008b"
  name: "Reservations + history follow-ups: PWA offline, full-trip search, upload validation"
  product: "PROD-001"
  parent: "SPEC-008"
  status: "shipped"
  shipped_on: "2026-05-25"
  owner: "Jason Robey"
  created: "2026-05-15"

  origin: >
    Items deferred from SPEC-008 retroactive deep review (2026-04-14).
    NOTE: PWA offline reservations (EXP-025) was advertised but never built
    — no service worker exists today. This stub closes the fiction.

  context:
    intentions:
      - "INT-007"
      - "INT-008"
    expectations:
      - "EXP-025 (PWA offline reservation claim — currently unimplemented)"

  scope:
    - id: "SPEC-008b.1"
      summary: "PWA offline reservations (EXP-025)"
      status: "shipped"
      shipped_on: "2026-05-25"
      problem: >
        Trip reservations should be viewable offline at the campsite where
        cell coverage drops. Manifest.json exists but there is no service
        worker, no cache strategy, no install prompt — the PWA is in name only.
      approach_hint: >
        Add next-pwa or workbox via @serwist/next. Cache trip detail page,
        reservations, packing list, meal plan with cache-first strategy.
        Add /offline fallback page. Register SW in root layout. Test on
        actual phone with airplane mode.
      priority: "high"
      reason: "Removes a fictional feature; real value at campsites."
      complexity: "Large — service worker, install prompt, caching strategy, offline-first UX states."
      implementation: >
        Serwist on Turbopack (@serwist/turbopack + serwist + esbuild).
        next.config.ts wrapped with withSerwist; SW source at app/sw.ts;
        route handler at app/serwist/[path]/route.ts; SerwistProvider in
        root layout registers the SW client-side. /serwist/, /sw.js, and
        /sw.js.map excluded from the auth proxy matcher so registration
        works for unauthenticated users.

        Trip-routes runtime caching: StaleWhileRevalidate over a canonical
        UUID regex (/dashboard/trips/{uuid}{,/reservations,/packing,/meals})
        in a 'trip-pages' cache (max 100 entries, 30-day TTL). Matcher
        excludes requests with the RSC: 1 header — RSC payloads fall
        through to defaultCache's pages-rsc bucket so HTML and RSC don't
        clobber each other under the same key. CacheableResponsePlugin
        (statuses [200]) + a custom rejectRedirected plugin prevent
        cached auth-redirect pages from poisoning trip URLs.

        Client surface: app/pwa/ contains OfflineContext (+ useIsOffline
        hook), OfflineBanner (sticky top-of-dashboard when offline),
        InstallButton (beforeinstallprompt + iOS-Safari fallback hint,
        localStorage dismissal), CachePrefetcher (mounted on trip detail,
        fires plain fetch() for the three sub-tabs 1s after mount so the
        SW caches them eagerly), CacheFreshness (small italic label when
        offline), and OfflineEmptyState (reused by four error.tsx
        boundaries — the first in the app — for never-cached trips
        encountered while offline).

        Edit-button gating: useIsOffline() disables ~25 mutation buttons
        across reservations / packing / meals / tasks / grocery clients
        with explanatory tooltips. Try/catch blocks distinguish offline
        failures from other errors via navigator.onLine and surface a
        user-friendly "you're offline" message. Optimistic-mutation
        handlers (toggle packed, toggle purchased, drag-and-drop meal
        move) bail early with `if (isOffline) return;` as belt-and-
        suspenders against any path that bypasses the disabled button
        (drag-drop has no button; race between offline-flip and click).

        On sign-out: caches.delete("trip-pages") clears cached pages so
        a subsequent sign-in (potentially as another user) can't see the
        previous account's trips. Failures swallowed so cache errors
        can't block sign-out.

        Simplification adopted vs the original design: CacheFreshness
        shows a static "Showing cached data" label rather than a per-page
        "cached · X min ago" delta — avoids SW↔client postMessage
        plumbing for marginal user value, since the banner already
        conveys "last synced." Can be added back later if needed.

        EXP-025 amended: write-queue + custom-eviction edge cases dropped
        (descoped as YAGNI for v1). Manual test log lives at
        docs/specs/SPEC-008b.1-test-log.md.

        Design: docs/superpowers/specs/2026-05-25-pwa-offline-reservations-design.md
        Plan:   docs/superpowers/plans/2026-05-25-pwa-offline-reservations.md

    - id: "SPEC-008b.2"
      summary: "History search across all journal entries"
      status: "shipped"
      shipped_on: "2026-05-24"
      problem: >
        Trip history search today only looks at the latest journal entry
        per trip (N+1 query, misses older entries).
      approach_hint: >
        Migration: add tsvector column to journal_entries with trigger.
        Replace the latest-entry query with a search across all entries.
        UI: highlight matching snippets.
      priority: "medium"
      implementation: >
        Migration 021 adds trip_journal_entries.search_tsv tsvector,
        maintained by a BEFORE INSERT/UPDATE trigger
        (update_journal_entry_search_tsv, SECURITY INVOKER, search_path
        locked) keyed off content with the 'english' text-search config
        (stemming, so 'firewood'/'firewoods' both match). Existing rows
        are backfilled in the migration. GIN index for index-backed
        @@ queries.

        search_journal_entries(_query text) RPC returns
        (trip_id, snippet, created_at) rows for every matching entry,
        ordered by created_at desc. SECURITY INVOKER so RLS still scopes
        results to trips the caller is a member of — no special filter
        needed. Uses websearch_to_tsquery (not to_tsquery) so user input
        is parsed gracefully without throwing on malformed queries.

        ts_headline emits snippets with custom « / » markers around
        matches rather than the default <b></b>. The history page's
        SnippetWithHighlights component splits on these markers and
        wraps each matched span in a <mark> via normal React text
        rendering — XSS-safe by construction, no HTML parsing.

        lib/queries/journal.ts:
        - getLatestJournalSnippetsForTrips(supabase, tripIds) — single
          batched query returning a Map<tripId, snippet>; replaces the
          N+1 loop the history page used to do at line 36-51 of the
          old page.tsx.
        - searchJournalEntries(supabase, query) — calls the RPC, dedupes
          to one match per trip (most recent matching entry).

        app/dashboard/history/page.tsx: load all completed trips +
        batched latest snippets at mount. Debounced (250ms) journal
        search hits the RPC on search-input change; matches override the
        fallback snippet on the card with highlighted spans. Date filter
        and trip-field text search (name/destination/notes) still run
        client-side; journal matches union with the text-field matches.
        Loading state shows "Searching..." badge during the debounced
        RPC call.

        validation per spec: "'great firewood' in trip A's oldest entry;
        trip B newer with no match. Search 'firewood' finds trip A" —
        works because the search hits the tsv index across ALL entries,
        not just the latest.

    - id: "SPEC-008b.3"
      summary: "Upload size + MIME validation for journal photos"
      status: "shipped"
      shipped_on: "2026-05-17"
      problem: >
        Photo uploads accept arbitrary size and type. Bucket could fill or
        get exotic files.
      approach_hint: >
        Client-side: reject > 10MB, validate MIME against image/jpeg|png|webp|heic
        before upload. Server-side: storage bucket policy with size limit
        and allowed_mime_types in the bucket config.
      priority: "high"
      reason: "Security/abuse — paired with the SPEC-008 storage lockdown."
      implementation: >
        Defense in depth: Migration 014 sets the storage bucket
        file_size_limit = 10 MB and restricts allowed_mime_types to image
        formats (jpeg, png, webp, heic, heif, gif) — Supabase Storage
        rejects oversized or wrong-type uploads regardless of client
        behavior (the actual guarantee). Client side, uploadJournalPhoto +
        handleFiles mirror the same limits so the user gets immediate
        feedback before sending bytes, and rejected files surface a
        specific "<file> (5.2 MB, max 10 MB)" message via the existing
        error banner instead of being silently dropped. Constants
        (JOURNAL_PHOTO_MAX_BYTES, JOURNAL_PHOTO_ALLOWED_MIME) exported from
        lib/queries/journal.ts so client + server share one source of
        truth. File input's accept attribute and hint text widened to
        include heif and gif. Closes the 2026-05-16 UX audit B3 finding.
        Commit d8eb31a.

  validation:
    human_review:
      - "PWA: install app on phone, enter airplane mode, open the trip, see reservation details + packing list"
      - "Search: log entries on trip A: 'great firewood'. Trip B newer with no match. Search 'firewood' finds trip A"
      - "Upload: try a 20MB PDF — rejected client-side with clear error"
