spec:
  id: "SPEC-006b"
  name: "Grocery + inventory follow-ups: units, auto-regen, dedupe, reconcile"
  product: "PROD-001"
  parent: "SPEC-006"
  status: "shipped"
  shipped_on: "2026-05-17"
  owner: "Jason Robey"
  created: "2026-05-15"

  origin: >
    Items deferred from SPEC-006 retroactive deep review (2026-04-14).

  context:
    intentions:
      - "INT-004"
      - "INT-005"

  scope:
    - id: "SPEC-006b.1"
      summary: "Unit-family bucketing"
      status: "shipped"
      shipped_on: "2026-05-15"
      problem: >
        Generation silently sums incompatible units (e.g., 2 cups + 1 lb is
        treated as 3). Either bucket by unit family (volume, weight, count)
        or refuse to combine across families and emit separate rows.
      approach_hint: >
        Define unit families in a small constants module. On aggregation,
        group ingredient + unit_family separately. Emit one grocery row per
        (ingredient, unit_family).
      priority: "high"
      reason: "Correctness — current behavior produces wrong shopping lists."
      implementation: >
        lib/queries/grocery.ts: added getUnitFamily() (weight via TO_GRAMS,
        volume via TO_ML, "count" for empty unit, otherwise unit name itself
        — each container type is its own family). Aggregation map keyed by
        aggKey(name, family) instead of just name. Inventory subtraction
        looks up the same composite key, so "5 lbs flour" inventory no
        longer offsets a "2 cups flour" recipe ingredient. Purchased-state
        carryover across regeneration also keyed by (name, family) so a
        purchased volume row doesn't poison a new weight row.

    - id: "SPEC-006b.2"
      summary: "Auto-regenerate grocery list on meal plan change"
      status: "shipped"
      shipped_on: "2026-05-17"
      problem: >
        Editing meals after generating a grocery list doesn't refresh the
        list. Users must remember to re-generate.
      approach_hint: >
        On meal_plan_entries mutation, mark the trip's grocery list stale
        with a banner: "Meal plan changed since last generated. Regenerate?"
        Don't auto-overwrite manual additions — confirm first.
      priority: "medium"
      implementation: >
        Migration 015 adds trip_meal_plans.meals_changed_at (timestamptz
        default now()), bumped by a SECURITY DEFINER after-insert/update/
        delete trigger on trip_meals so all RLS paths bump it uniformly.
        trip_grocery_lists.last_generated_at is stamped by
        generateGroceryListFromMeals on every successful generation.
        getGroceryStaleness in lib/queries/grocery.ts returns
        { isStale, hasMealPlan, hasGroceryItems } — stale iff a meal plan
        exists AND the list has items AND meals_changed_at > last_generated_at.
        GroceryListClient renders a banner above the progress bar for stale
        planners; copy is explicit that manual items and purchased state are
        preserved (leans on SPEC-006b.1's idempotent regeneration). Commit
        dce478d.

    - id: "SPEC-006b.3"
      summary: "Dedupe of manual grocery additions vs generated rows"
      status: "shipped"
      shipped_on: "2026-05-17"
      problem: >
        Manual adds today can duplicate auto-generated rows for the same
        ingredient. No merge logic.
      approach_hint: >
        On generate, fold manual rows with same (name, unit) into the
        generated row (sum quantities). Preserve manual flag for UX.
      priority: "medium"
      implementation: >
        addGroceryItem now checks for an existing row matching
        (lower(name), lower(unit)) on the same grocery list and folds the
        new quantity into it instead of inserting a duplicate row. Cross-
        family typing ("2 cups flour" + "1 lb flour") still produces two
        rows — correct shopping-list behavior, same principle as SPEC-006b.1's
        unit-family bucketing. Commit 50ba8d8.

    - id: "SPEC-006b.4"
      summary: "Reconcile: add-to-inventory for newly-purchased items"
      status: "shipped"
      shipped_on: "2026-05-17"
      problem: >
        After shopping, items checked off the grocery list don't update the
        camper inventory automatically. Users repeat the work.
      approach_hint: >
        On grocery_item.purchased=true, prompt: "Add to camper inventory?"
        with a one-tap confirm. Map ingredient -> inventory item by name
        with override on conflict.
      priority: "medium"
      implementation: >
        Distinct from the existing trip-completion reconcile (which
        DECREMENTS inventory by amount consumed) — this new path ADDS the
        items you just bought to the camper inventory (stockpiling,
        non-perishables, etc). Migration 016 adds
        trip_grocery_items.added_to_inventory_at timestamptz.
        addPurchasedToInventory query finds purchased items where
        added_to_inventory_at IS NULL, merges with existing camper_inventory
        rows (same lower(name)) by summing quantity or inserts new rows, and
        stamps added_to_inventory_at on all source items so repeat clicks
        are no-ops. Returns { inserted, merged, itemsAdded } so the UI can
        give specific feedback ("Added 4 items (2 new, 2 merged)."). The
        "Add purchased to inventory" button hides when there's nothing to
        do. Commit 50ba8d8.

  validation:
    human_review:
      - "Plan meals using 2 cups flour + 1 lb flour; grocery list shows two separate rows, not 3 of something"
      - "Edit a meal after generating; banner appears prompting regeneration"
      - "Check off purchased items; inventory updates with new quantities"
