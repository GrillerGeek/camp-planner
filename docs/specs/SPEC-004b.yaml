spec:
  id: "SPEC-004b"
  name: "Packing list follow-ups: multi-assignee, trip_type matching, audit columns"
  product: "PROD-001"
  parent: "SPEC-004"
  status: "backlog"
  owner: "Jason Robey"
  created: "2026-05-15"

  origin: >
    Items deferred from SPEC-004 retroactive deep review (2026-04-14).

  context:
    intentions:
      - "INT-002"
    expectations:
      - "EXP-004"
      - "EXP-007 (multi-assignee — currently violated)"

  scope:
    - id: "SPEC-004b.1"
      summary: "Multi-assignee packing items (EXP-007 compliance)"
      status: "shipped"
      shipped_on: "2026-05-17"
      problem: >
        packing_items.assigned_to is a single uuid, contradicting EXP-007
        which requires items to be assignable to multiple trip members.
        Today the UI silently picks the first.
      approach_hint: >
        Migration: packing_items.assigned_to uuid -> assigned_to uuid[].
        Update PackingListClient assignment picker to multi-select. Update
        guest-share filter (currently `assigned_to is not null` and `= guest`)
        to use array containment.
      priority: "medium"
      implementation: >
        Migration 013 replaces trip_packing_items.assigned_to (uuid) with
        assignees (uuid[] not null default '{}'), backfilling each non-null
        value as a single-element array before dropping the old column.
        Rebuilds the SPEC-002d.3 viewer policy + scope trigger to use array
        containment (auth.uid() = ANY(assignees)) instead of equality, and
        rebuilds get_shared_trip to aggregate assignee names via a lateral
        unnest + string_agg. GIN index on assignees for cheap member-filter
        queries. PackingListClient switches from a single-select dropdown to
        per-member toggle chips (first name displayed). Tasks intentionally
        untouched — single assigned_to matches their semantics ("buys ice"
        is one person). Commit 529cf3f.

    - id: "SPEC-004b.2"
      summary: "trip_type matching in findMatchingTemplates"
      status: "shipped"
      shipped_on: "2026-05-25"
      problem: >
        findMatchingTemplates today matches on season + duration but ignores
        trip_type. INT-002 specifically calls out trip-type-aware templates
        as the value prop.
      approach_hint: >
        Extend the template metadata to carry trip_type, add the filter to
        findMatchingTemplates, and surface trip_type in the templates editor.
      priority: "medium"
      implementation: >
        Note: findMatchingTemplates was removed during the SPEC-002c
        refactor (auto-apply replaced by an always-on Apply Template
        modal listing every template). The remaining gap was deeper —
        packing_templates carried a trip_types text[] column (migration
        002) but trips themselves had no trip_type to match against.
        INT-002's promise of trip-type-aware templates was therefore
        fictional. This fix closes that by adding the column on trips
        and using it to rank templates in the apply modal.

        Migration 023:
        - trips.trip_type text nullable, CHECK constraint matching the
          TRIP_TYPES TS enum (tent / rv / cabin / backpacking).
        - Nullable on purpose: existing trips can't be backfilled
          truthfully ('tent' would be a guess, not knowledge), and some
          trips legitimately start undecided. Null reads as "no signal,
          fall back to season-only matching" in the apply modal.

        lib/types/trip.ts: Trip.trip_type and TripFormData.trip_type
        (with "" representing unset in the form, written as null to DB).

        lib/queries/trips.ts: createTrip and updateTrip both wire
        trip_type through, converting empty string to null at the DB
        boundary.

        TripForm: new chip selector between Campsite Info and Notes
        with all four TRIP_TYPES values. Clicking the active chip
        clears the selection (back to ""). Helper text under the label
        explains the value prop ("Helps surface matching packing
        templates when you apply one.").

        PackingListClient: templates are now sorted in the apply modal
        by a three-tier score:
        - 2 (Recommended): matches BOTH season AND trip_type
        - 1 (Match): matches one of the two
        - 0 (Other): matches neither
        Within the same tier, original updated_at-desc order is
        preserved. "Recommended" templates get a small badge next to
        the name and a camp-forest border accent. Matching trip_type
        chips get the high-intensity color (camp-fire/30) while
        non-matching ones stay muted (camp-fire/10) — same visual
        rhythm as the season chips' camp-sky treatment.

        For trips with trip_type=null (existing trips or "not sure"
        ones), the trip_type criterion always fails, so the ranking
        collapses to season-only — i.e., identical UX to the
        pre-migration behavior. No regression for unset trips.

    - id: "SPEC-004b.3"
      summary: "checked_by + checked_at audit columns"
      problem: >
        Today only checked: boolean is stored. No way to show "Angie checked
        this off 5 min ago" in the UI or in trip history.
      approach_hint: >
        Migration: add checked_by uuid (fk profiles) + checked_at timestamptz.
        Populate from the check-off mutation. Render in tooltip or sidebar.
      priority: "low"

  validation:
    human_review:
      - "Multi-assignee: assign an item to both planners; both see it on their share view"
      - "Templates: create a tent-camping template, switch trip to RV; template is not auto-applied"
      - "Audit: check off an item, hover the row, see 'Checked by Jason at 3:42 PM'"
